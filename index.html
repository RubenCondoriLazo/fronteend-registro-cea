<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RubenStore - Mi Tienda Online</title>
    <link rel="stylesheet" href="css/store_styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <div class="logo">RubenStore</div>
            <nav>
                <ul id="nav-links">
                    <li><a href="#" data-view="catalog">Catálogo</a></li>
                    <li><a href="#" id="cart-link">Carrito (<span id="cart-count">0</span>)</a></li>
                    <li><a href="#" id="login-nav" data-view="login">Entrar</a></li>
                    <li id="user-nav" class="hidden">
                        <span id="username-display">Usuario</span>
                        <a href="#" id="logout-btn">Salir</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <!-- Catalog View -->
        <section id="catalog-view" class="view">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Buscar productos...">
            </div>
            <div id="product-list" class="product-grid">
                <!-- Products will be loaded here -->
            </div>
        </section>

        <!-- Cart View -->
        <section id="cart-view" class="view hidden">
            <h2>Tu Carrito</h2>
            <div id="cart-items" class="cart-list">
                <!-- Cart items here -->
            </div>
            <div class="cart-summary">
                <h3>Total: <span id="cart-total">$0.00</span></h3>
                <button id="checkout-btn" class="btn-purchase">Finalizar Compra</button>
            </div>
        </section>

        <!-- Login View -->
        <section id="login-view" class="view hidden">
            <div class="auth-card">
                <h2>Iniciar Sesión</h2>
                <form id="store-login-form">
                    <input type="text" id="store-username" placeholder="Usuario" required>
                    <input type="password" id="store-password" placeholder="Contraseña" required>
                    <button type="submit">Entrar</button>
                </form>
            </div>
        </section>

        <!-- Admin View -->
        <section id="admin-view" class="view hidden">
            <h2>Panel de Administración</h2>
            <div id="admin-stats" class="stats-grid">
                <!-- Stats load here -->
            </div>
            <div class="admin-actions">
                <button id="add-product-modal-btn">+ Agregar Producto</button>
            </div>
        </section>
    </main>

    <script src="js/store_logic.js"></script>
</body>
</html>
